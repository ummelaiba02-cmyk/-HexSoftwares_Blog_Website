<!DOCTYPE html>
<html>
<head>
    <title>Blog Posts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- MENU -->
        <div class="menu">
            <a href="index.html">🏠 Home</a>
            <a href="blog.html">📝 Blog</a>
            <a href="about.html">👤 About</a>
            <a href="contact.html">📧 Contact</a>
        </div>

        <h1>📝 Blog Posts</h1>

        <!-- BLOG IMAGE -->
        <img src="https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=1200" 
             alt="Writing" class="page-img">

        <!-- POSTS CONTAINER -->
        <div id="postsContainer"></div>

        <!-- ADD POST FORM -->
        <div class="form-container">
            <h2>✍️ Write a New Post</h2>
            <form id="blogForm">
                <label>📌 Title:</label>
                <input type="text" id="postTitle" placeholder="Enter blog title..." required>
                
                <label>📝 Content:</label>
                <textarea id="postContent" rows="5" placeholder="Write your blog content here..." required></textarea>
                
                <button type="submit">🚀 Publish Post</button>
            </form>
        </div>

        <div class="footer">
            <p>© 2026 My Awesome Blog | Built with ❤️</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
